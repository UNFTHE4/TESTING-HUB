<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UNF Stream Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0f0f0f; font-family: Roboto, Arial, sans-serif; color:#fff; }
        :root { --mint: #00ff66; }
        
        #main-content { padding: 20px; }
        .watch-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1400px; margin: 0 auto; }
        
        #video-header { background: #000; border-radius: 12px; overflow: hidden; }
        #player { width: 100%; aspect-ratio: 16/9; background: #000; }
        .controls { display: flex; align-items: center; padding: 15px; background: #1a1a1a; color: var(--mint); font-weight: bold; }
        
        .sidebar { height: 80vh; overflow-y: auto; background: #1a1a1a; border-radius: 12px; padding: 10px; }
        .card { padding: 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; background: #262626; border-left: 4px solid transparent; }
        .card:hover { background: #333; }
        .card.active { border-left-color: var(--mint); background: #333; }
        
        @media (max-width: 900px) { .watch-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="main-content">
    <div class="watch-container">
        <div id="video-header">
            <video id="player" controls playsinline></video>
            <div class="controls">
                <span id="status-text">SELECT CHANNEL</span>
            </div>
        </div>
        <div class="sidebar" id="channel-grid"></div>
    </div>
</div>

<script>
const channels = [
    {name: "T SPORTS", url: "https://tv.emnetbd.com/flussonic/Tsports1/tracks-v1a1/mono.m3u8", lang: "BAN/ENG", status: "online"},
    {name: "SKY SPORTS F1", url: "https://xstm.250909.cc/live/SPORTSFLUX-POOL-20acb0a9c8/5ffe6c552a88/1037.m3u8", lang: "ENG", status: "online"},
    {name: "ESPN", url: "https://1nyaler.streamhostingcdn.top/stream/97/index.m3u8", lang: "DUT", status: "offline"},
    {name: "beIN SPORTS 1", url: "https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8", lang: "FRE", status: "online"},
    {name: "beIN SPORTS XTRA", url: "https://bein-esp-xumo.amagi.tv/playlistR1080p.m3u8", lang: "UNK", status: "online"},
    {name: "DAZN SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/94/index.m3u8", lang: "SPA", status: "online"},
    {name: "DAZN F1", url: "https://tv.topmediatv.net:25463/live/TopMediaWeb/bOteTR8ED1/374.m3u8", lang: "SPA", status: "online"},
    {name: "FOX SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/26/index.m3u8", lang: "ENG", status: "online"},
    {name: "FOX", url: "https://d1jzu95oc8fgt3.cloudfront.net/FOX_Sports720p.m3u8", lang: "ENG", status: "online"},
    {name: "TSN", url: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd", lang: "ENG", status: "online"},
    {name: "D SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8", lang: "ENG", status: "online"},
    {name: "TOFFEE", url: "https://sm-monirul.top/tof/live/toffee4/index.m3u8", lang: "ENG", status: "online"},
    {name: "WIN SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8", lang: "UNK", status: "online"}
];

    const grid = document.getElementById('channel-grid');
    const vid = document.getElementById('player');
    let hls = null;

    channels.forEach(c => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<strong>${c.name}</strong><br><small>${c.lang}</small>`;
        card.onclick = () => {
            document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
            card.classList.add('active');
            document.getElementById('status-text').innerText = c.name;
            playStream(c.url);
        };
        grid.appendChild(card);
    });

    async function playStream(url) {
        if (hls) { hls.destroy(); hls = null; }
        if (window.shakaPlayer) { await window.shakaPlayer.destroy(); }

        if (url.includes('.mpd')) {
            const player = new shaka.Player(vid);
            window.shakaPlayer = player;
            await player.load(url);
            vid.play();
        } else {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
        }
    }
</script>

</body>
</html>
