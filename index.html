<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>UNF STREAM HUB</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/webp" href="https://i.ibb.co.com/0yFrNTmv/UNF-DESIGN-20260123-224445-0001.webp">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.0.0/dist/videojs-http-streaming.min.js"></script>

    <style>
        /* --- KEEPING YOUR THEME --- */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0b0c10; font-family:sans-serif; color:#fff; overflow-x:hidden; min-height:100vh; }
        :root { --mint: #00ff66; --panel: #11141a; --red: #ff4757; }
        
        /* --- YOUTUBE-STYLE PLAYER OVERRIDES --- */
        .video-js .vjs-control-bar { background: rgba(0, 0, 0, 0.7) !important; }
        .video-js .vjs-play-progress { background-color: #ff0000 !important; }
        .video-js .vjs-big-play-button {
            background-color: rgba(0, 0, 0, 0.5) !important;
            border-radius: 50% !important;
            border: 2px solid #fff !important;
            width: 2.5em !important; height: 2.5em !important;
            line-height: 2.5em !important;
            left: 50% !important; top: 50% !important;
            margin-left: -1.25em !important; margin-top: -1.25em !important;
        }

        /* --- YOUR EXISTING STYLES --- */
        #welcome-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: url("https://i.ibb.co.com/vvCwyJG5/WC-1.png") center/cover no-repeat; background-color: #0b0c10; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .welcome-box { background: linear-gradient(135deg, #000, #00ff6611); padding: 40px 30px; border: 2px solid var(--mint); border-radius: 20px; text-align: center; max-width: 400px; width: 90%; }
        .logo-img { width: 120px; height: auto; margin-bottom: 15px; border-radius: 10px; }
        .welcome-box h1 { color: var(--mint); font-size: 1.8rem; margin-bottom: 5px; }
        .welcome-box p { color: #889; font-size: 0.9rem; margin-bottom: 20px; }
        #passcode-input { background: transparent; border: 2px solid var(--mint); color: var(--mint); padding: 12px; font-size: 1.5rem; text-align: center; width: 120px; letter-spacing: 8px; border-radius: 8px; outline: none; }
        #main-content { display: none; max-width: 1000px; margin: 0 auto; padding: 0 10px 20px; }
        #video-header { background: #000; position: relative; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); border-bottom: 2px solid var(--mint); }
        .top-bar .logo span { color: var(--mint); font-weight: bold; font-size: 1.2rem; }
        #digital-clock { color: var(--mint); font-family: monospace; font-size: 1rem; background: rgba(0,0,0,0.5); padding: 4px 14px; border-radius: 20px; border: 1px solid var(--mint); }
        .grid { display: grid; gap: 10px; padding: 15px 0; grid-template-columns: repeat(3, 1fr); }
        .card { background: var(--panel); padding: 15px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; color: #fff; }
        .card.active { border-color: var(--mint); background: #1a2a3a; }
        .footer { text-align: center; font-size: 11px; color: #666; padding: 30px 10px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-box">
            <img class="logo-img" src="https://i.ibb.co.com/Df6zYZTZ/Adobe-Express-file.png" alt="UNF Logo">
            <h1>UNF STREAM HUB</h1>
            <input id="passcode-input" type="password" maxlength="4" placeholder="****" inputmode="numeric">
        </div>
    </div>

    <div id="main-content">
        <div class="top-bar">
            <div class="logo"><span>UNF</span></div>
            <div id="digital-clock">00:00 AM</div>
        </div>

        <div id="video-header">
            <video id="player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="auto" style="aspect-ratio: 16/9;" playsinline></video>
            <div class="grid" id="channel-grid"></div>
        </div>
        <div class="footer">All RIGHTS OWNED BY UNF STREAM HUB SERVICE © 2026</div>
    </div>

    <script>
        // Init Player
        const player = videojs('player');

        // Passcode
        document.getElementById('passcode-input').addEventListener('input', function() {
            if (this.value === "6767") {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        });

        // HLS Player Function
        function playHls(url) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }

        // Channels
 const channels = [
    {name: "T SPORTS", url: "https://tv.emnetbd.com/flussonic/Tsports1/tracks-v1a1/mono.m3u8", lang: "BAN/ENG", status: "online"},
    {name: "SKY SPORTS F1", url: "https://xstm.250909.cc/live/SPORTSFLUX-POOL-20acb0a9c8/5ffe6c552a88/1037.m3u8", lang: "ENG", status: "online"},
    {name: "ESPN", url: "https://1nyaler.streamhostingcdn.top/stream/97/index.m3u8", lang: "DUT", status: "offline"},
    {name: "beIN SPORTS 1", url: "https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8", lang: "FRE", status: "online"},
    {name: "beIN SPORTS XTRA", url: "https://bein-esp-xumo.amagi.tv/playlistR1080p.m3u8", lang: "UNK", status: "online"},
    {name: "DAZN SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/94/index.m3u8", lang: "SPA", status: "online"},
    {name: "DAZN F1", url: "https://tv.topmediatv.net:25463/live/TopMediaWeb/bOteTR8ED1/374.m3u8", lang: "SPA", status: "online"},
    {name: "FOX SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/26/index.m3u8", lang: "ENG", status: "online"},
    {name: "FOX", url: "https://d1jzu95oc8fgt3.cloudfront.net/FOX_Sports720p.m3u8", lang: "ENG", status: "online"},
    {name: "TSN", url: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd", lang: "ENG", status: "online"},
    {name: "D SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8", lang: "ENG", status: "online"},
    {name: "TOFFEE", url: "https://sm-monirul.top/tof/live/toffee4/index.m3u8", lang: "ENG", status: "online"},
    {name: "WIN SPORTS", url: "https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8", lang: "UNK", status: "online"}
];


        const grid = document.getElementById('channel-grid');
        channels.forEach(c => {
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<b>${c.name}</b>`;
            card.onclick = () => playHls(c.url);
            grid.appendChild(card);
        });

        // Clock
        function updateClock() {
            document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', hour12: true});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
